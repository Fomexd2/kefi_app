name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate iOS project structure
        run: flutter create --platforms=ios --project-name kefi_app .

      - name: Build iOS (sin firma)
        run: flutter build ios --release --no-codesign

      - name: Empaquetar IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r kefi_app.ipa Payload/

      - name: Subir IPA como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: kefi_app_ios
          path: build/ios/iphoneos/kefi_app.ipa
          retention-days: 30
